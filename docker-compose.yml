# Updated Docker Compose with Angular Frontend Services

version: '3.8'

services:
  # MySQL Database
  firefly-db:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_RANDOM_ROOT_PASSWORD: "yes"
      MYSQL_DATABASE: "firefly"
      MYSQL_USER: "firefly"
      MYSQL_PASSWORD: "firefly_password"
    ports:
      - "3306:3306"
    volumes:
      - firefly-db:/var/lib/mysql
    networks:
      - firefly-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Firefly III Backend (API Only - No UI)
  firefly-app:
    image: fireflyiii/core:latest
    restart: unless-stopped
    ports:
      - "8081:8080"  # Changed to 8081 for backend API access
    depends_on:
      firefly-db:
        condition: service_healthy
    environment:
      # Application Settings
      APP_ENV: "production"
      APP_DEBUG: "false"
      APP_KEY: "base64:8iMI/7OVoJHlflCPwXKXMLm5Aq4v1qp4HZ0H9VT0qPY="
      
      # URLs (point to Angular frontend)
      APP_URL: "http://localhost:80"
      TRUSTED_PROXIES: "**"
      
      # Database
      DB_CONNECTION: "mysql"
      DB_HOST: "firefly-db"
      DB_PORT: "3306"
      DB_DATABASE: "firefly"
      DB_USERNAME: "firefly"
      DB_PASSWORD: "firefly_password"
      
      # Mail
      MAIL_MAILER: "log"
      
      # Admin settings
      SITE_OWNER: "admin@localhost"
      
      # Logging
      LOG_CHANNEL: "stack"
      
    volumes:
      - firefly-app:/var/www/html/storage/upload
    networks:
      - firefly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/v1/about"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ========== ANGULAR FRONTEND DEVELOPMENT ==========
  # Development Service (Hot-Reload)
  firefly-ui-dev:
    build:
      context: .
      dockerfile: docker/Dockerfile.angular.dev
    volumes:
      - ./resources/angular/src:/app/src                    # Source code volume
      - ./resources/angular/package.json:/app/package.json  # Keep package.json synced
      - angular-node-modules:/app/node_modules              # Cache node_modules
    ports:
      - "4200:4200"  # Angular dev server
    depends_on:
      - firefly-app
    networks:
      - firefly-network
    environment:
      - NODE_ENV=development
      - API_URL=http://firefly-app:8080
    command: ng serve --host 0.0.0.0 --port 4200 --poll 2000
    # Only use for development
    # Comment out below and run docker-compose up to enable
    # For production, use firefly-ui service instead

  # ========== ANGULAR FRONTEND PRODUCTION ==========
  # Production Service (Nginx)
  firefly-ui:
    build:
      context: .
      dockerfile: docker/Dockerfile.angular
    ports:
      - "80:80"  # Main frontend on port 80
    depends_on:
      - firefly-app
    networks:
      - firefly-network
    # Production build - only enable when ready for deployment
    profiles:
      - prod  # Run with: docker-compose --profile prod up
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Data Importer
  firefly-importer:
    image: fireflyiii/data-importer:latest
    restart: unless-stopped
    ports:
      - "8888:8080"
    depends_on:
      - firefly-app
    environment:
      APP_ENV: "production"
      APP_DEBUG: "false"
      APP_KEY: "base64:UE3HvJa/tKY0R2vJk3AX0F8uPG3mU3jY6R5h2pN0xQw="
      
      # Firefly III API settings
      FIREFLY_III_URL: "http://firefly-app:8080"
      FIREFLY_III_ACCESS_TOKEN: ""
      VANITY_URL: "http://localhost"
      
      # File upload settings
      CAN_POST_FILES: "true"
      AUTO_IMPORT_SECRET: "your_auto_import_secret_here"
      
      # Mail
      MAIL_MAILER: "log"
      
      # Locale
      FALLBACK_LOCALE: "en_US"
      
    volumes:
      - firefly-importer:/var/www/html/storage/upload
    networks:
      - firefly-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  firefly-db:
  firefly-app:
  firefly-importer:
  angular-node-modules:  # Cache for node_modules in dev

networks:
  firefly-network:
    driver: bridge
