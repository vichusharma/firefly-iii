# Angular SPA configuration - serve Angular for non-API and non-file routes
# This is included AFTER the default http.conf, so specific location blocks take precedence

# Static assets - serve directly with long cache
location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|txt|webmanifest|map)$ {
    try_files /dist$uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# API and Laravel routes - pass to PHP
location ~ ^/(api|login|logout|register|dashboard|accounts|transactions|budgets|rules|reports|admin|sanctum) {
    try_files $uri /index.php?$query_string;
}

# Health check
location = /healthcheck {
    access_log off;
    fastcgi_read_timeout 5s;
    include        fastcgi_params;
    fastcgi_param  SCRIPT_NAME     /healthcheck;
    fastcgi_param  SCRIPT_FILENAME /healthcheck;
    fastcgi_pass   127.0.0.1:9000;
}



