# Angular SPA configuration
# Serve Angular static assets with caching
location ~ \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|txt|webmanifest|map)$ {
    try_files /dist$uri $uri =404;
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
}

# API routes - pass to Laravel/PHP
location ~ ^/api/ {
    try_files $uri /index.php?$query_string;
}

# CSRF token endpoint - must pass to PHP
location = /csrf-token {
    try_files $uri /index.php?$query_string;
}

# Login endpoint: handle GET (serve Angular) and POST (route to PHP)
location = /login {
    if ($request_method = GET) {
        rewrite ^ /index.html last;
    }
    if ($request_method = POST) {
        rewrite ^ /index.php?$query_string last;
    }
}

# Registration endpoint: handle GET (serve Angular) and POST (route to PHP)
location = /register {
    if ($request_method = GET) {
        rewrite ^ /index.html last;
    }
    if ($request_method = POST) {
        rewrite ^ /index.php?$query_string last;
    }
}

# Firefly III specific routes - pass to PHP
location ~ ^/(logout|dashboard|accounts|transactions|budgets|rules|reports|admin|sanctum|search|profile|preferences) {
    try_files $uri /index.php?$query_string;
}

# Health check
location = /healthcheck {
    access_log off;
    fastcgi_read_timeout 5s;
    include fastcgi_params;
    fastcgi_param SCRIPT_NAME /healthcheck;
    fastcgi_param SCRIPT_FILENAME /healthcheck;
    fastcgi_pass 127.0.0.1:9000;
}